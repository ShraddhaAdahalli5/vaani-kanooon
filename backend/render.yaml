services:
  # FastAPI Backend Service
  - type: web
    name: vani-kanoon-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    
    # Environment variables (set in Render dashboard)
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 10000
    
    # Auto-deploy from GitHub
    repo: https://github.com/your-username/vani-kanoon.git
    branch: main
    rootDir: backend
    
    # Build and deployment settings
    buildFilter:
      paths:
        - backend/**
    
    # Performance settings
    scaling:
      minInstances: 1
      maxInstances: 3
    
    # Health check configuration
    healthCheck:
      path: /api/health
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
